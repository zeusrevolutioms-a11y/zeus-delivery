<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ROTA SPEED</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* LOADING */
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#loading img{
width:130px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* CARD */
.card{
background:#111827;
padding:30px;
border-radius:15px;
width:95%;
max-width:360px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.logo{
width:65px;
margin-bottom:10px;
}

h1{
font-size:28px;
margin-bottom:5px;
}

p{
opacity:.8;
margin-bottom:15px;
}

input{
width:100%;
padding:13px;
border:none;
border-radius:10px;
margin-bottom:10px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:8px;
font-weight:bold;
font-size:15px;
cursor:pointer;
color:white;
}

.btn-login{
background:#22c55e;
}

.btn-cad{
background:#374151;
}

.btn-off{
background:#ef4444;
}

#status{
margin-top:15px;
font-size:14px;
}

</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
<img src="https://i.postimg.cc/XYprkPvs/Motinha.png">
<h2>ROTA SPEED</h2>
<p>Carregando Rotas...</p>
</div>

<!-- CARD -->
<div class="card">

<img class="logo" src="https://i.postimg.cc/XYprkPvs/Motinha.png">

<h1>ROTA SPEED</h1>
<p>Rastreamento em Tempo Real</p>

<input id="id" placeholder="Seu ID">
<input id="senha" type="password" placeholder="Senha">

<button class="btn-login" onclick="login()">ENTRAR</button>

<button class="btn-cad" onclick="register()">CRIAR CONTA</button>

<button class="btn-off" onclick="desligar()">SAIR DE SERVIÇO</button>

<div id="status"></div>

</div>

<script>

const API = window.location.origin;
let watchId = null;

// LOADING
window.onload = ()=>{

setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2200);

const salvo = localStorage.getItem("motoboy_id");

if(salvo){
document.getElementById("id").value = salvo;
}

};

// LOGIN
async function login(){

const id = document.getElementById("id").value;
const senha = document.getElementById("senha").value;

if(!id || !senha){
alert("Preencha tudo");
return;
}

const res = await fetch(API+'/login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id,senha})
});

const data = await res.json();

if(data.error){
alert(data.error);
return;
}

localStorage.setItem("motoboy_id",id);

startGPS(id);

}

// CADASTRO
async function register(){

const id = document.getElementById("id").value;
const senha = document.getElementById("senha").value;

if(!id || !senha){
alert("Preencha tudo");
return;
}

const res = await fetch(API+'/register',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id,senha})
});

const data = await res.json();

if(data.error){
alert(data.error);
return;
}

alert("Conta criada com sucesso 🚀");

}

// GPS
function startGPS(id){

if(watchId){
navigator.geolocation.clearWatch(watchId);
}

watchId = navigator.geolocation.watchPosition((pos)=>{

fetch(API+'/location',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
id:id,
lat:pos.coords.latitude,
lng:pos.coords.longitude
})
});

document.getElementById("status").innerHTML="🟢 Online - Enviando localização";

},()=>{

document.getElementById("status").innerHTML="❌ GPS negado";

},{
enableHighAccuracy:true,
maximumAge:0
});

}

// OFFLINE
async function desligar(){

const id = document.getElementById("id").value;

if(watchId){
navigator.geolocation.clearWatch(watchId);
}

await fetch(API+'/offline',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id})
});

document.getElementById("status").innerHTML="🔴 Offline";

}

</script>
</body>
</html>
