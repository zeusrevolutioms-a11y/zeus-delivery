<!DOCTYPE html>
<html>
<head>
    <title>ROTA SPEED</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin:0;
            font-family: Arial;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card {
            background:#111827;
            padding:30px;
            border-radius:15px;
            width:90%;
            max-width:350px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom:10px;
        }

        p {
            font-size:14px;
            color:#9ca3af;
            margin-bottom:20px;
        }

        input {
            width:100%;
            padding:12px;
            border-radius:10px;
            border:none;
            margin-bottom:15px;
            font-size:16px;
        }

        button {
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#22c55e;
            color:white;
            font-size:16px;
            font-weight:bold;
        }

        .status {
            margin-top:15px;
            font-size:14px;
        }

        .logo {
            font-size:40px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="logo">🏍️</div>

    <h1>ROTA SPEED</h1>
    <p>Rastreamento em tempo real</p>

    <input id="id" placeholder="Digite seu ID">

    <button onclick="start()">ENTRAR</button>

    <div class="status" id="status"></div>

</div>

<script>

let watchId = null;

// 🔁 AUTO LOGIN
window.onload = () => {
    const saved = localStorage.getItem("motoboy_id");

    if(saved){
        document.getElementById("id").value = saved;
        start(); // entra automático
    }
};

function start(){

    const id = document.getElementById("id").value;

    if(!id){
        alert("Digite seu ID");
        return;
    }

    localStorage.setItem("motoboy_id", id);

    if(watchId){
        navigator.geolocation.clearWatch(watchId);
    }

    watchId = navigator.geolocation.watchPosition((pos)=>{

        fetch('/location',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                id:id,
                lat:pos.coords.latitude,
                lng:pos.coords.longitude
            })
        });

        document.getElementById("status").innerHTML = "📡 Enviando localização...";

    },(err)=>{
        document.getElementById("status").innerHTML = "❌ GPS negado";
    },{
        enableHighAccuracy:true
    });

    document.getElementById("status").innerHTML = "✅ Conectado";
}

</script>

</body>
</html>
