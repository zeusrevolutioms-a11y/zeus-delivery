<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<link rel="manifest" href="/motoboy/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>ROTA SPEED</title>

<!-- ========================================================= -->
<!-- 🗺️ LEAFLET MAPA -->
<!-- ========================================================= -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

/* ========================================================= */
/* RESET */
/* ========================================================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:#fff;
overflow:hidden;
height:100vh;
}

/* ========================================================= */
/* 🔥 LOADING */
/* ========================================================= */
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
}

#loading img{
width:130px;
animation:pulse 1.4s infinite;
margin-bottom:10px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* ========================================================= */
/* 🔐 LOGIN */
/* ========================================================= */
#loginBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:95%;
max-width:360px;
background:#111827;
padding:28px;
border-radius:18px;
box-shadow:0 0 30px rgba(0,0,0,.45);
z-index:5000;
}

.logo{
width:70px;
display:block;
margin:auto;
margin-bottom:10px;
}

h1{
font-size:30px;
text-align:center;
margin-bottom:5px;
}

.sub{
text-align:center;
opacity:.8;
margin-bottom:18px;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
margin-bottom:10px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
color:#fff;
}

.btn-login{background:#22c55e;}
.btn-cad{background:#374151;}

#status{
margin-top:12px;
text-align:center;
font-size:14px;
}

/* ========================================================= */
/* 🏍️ PAINEL */
/* ========================================================= */
#painel{
display:none;
width:100%;
height:100vh;
position:relative;
}

#map{
width:100%;
height:100%;
}

/* ========================================================= */
/* TOPO */
/* ========================================================= */
#topo{
position:absolute;
top:15px;
left:15px;
right:15px;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
}

#menuBtn{
width:56px;
height:56px;
border:none;
border-radius:18px;
background:#fff;
color:#000;
font-size:24px;
cursor:pointer;
}

#saldo{
background:#fff;
color:#000;
padding:16px 20px;
border-radius:18px;
font-size:22px;
font-weight:bold;
min-width:130px;
text-align:center;
}

/* ========================================================= */
/* BOTOES DIREITA */
/* ========================================================= */
#sideBtns{
position:absolute;
right:15px;
top:95px;
z-index:999;
display:flex;
flex-direction:column;
gap:12px;
}

.miniBtn{
width:58px;
height:58px;
border-radius:50%;
background:#fff;
color:#000;
font-size:22px;
border:none;
cursor:pointer;
}

/* ========================================================= */
/* BOTAO ONLINE OFFLINE */
/* ========================================================= */
#livreBox{
position:absolute;
left:15px;
right:15px;
bottom:58px;
z-index:999;
}

#btnLivre{
width:100%;
padding:18px;
font-size:30px;
font-weight:bold;
border:none;
border-radius:18px;
background:#ef4444;
color:#fff;
transition:.3s;
cursor:pointer;
}

/* ========================================================= */
/* RODAPE */
/* ========================================================= */
#footerMoto{
position:absolute;
left:0;
right:0;
bottom:0;
height:42px;
background:#111827;
display:flex;
justify-content:center;
align-items:center;
font-size:14px;
font-weight:bold;
z-index:999;
}

/* ========================================================= */
/* MENU LATERAL */
/* ========================================================= */
#menuLateral{
position:absolute;
top:0;
left:-280px;
width:260px;
height:100%;
background:#111827;
padding:20px;
z-index:2000;
transition:.3s;
}

#menuLateral.ativo{
left:0;
}

.menuItem{
background:#1f2937;
padding:14px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
}

/* ========================================================= */
/* ZOOM MAPA */
/* ========================================================= */
.leaflet-top.leaflet-left{
top:85px !important;
left:15px !important;
}

/* ========================================================= */
/* MOBILE */
/* ========================================================= */
@media(max-width:768px){

#saldo{
font-size:18px;
padding:14px;
min-width:110px;
}

#btnLivre{
font-size:24px;
padding:16px;
}

}

</style>
</head>
<body>

<!-- ========================================================= -->
<!-- LOADING -->
<!-- ========================================================= -->
<div id="loading">
<img src="https://i.postimg.cc/XYprkPvs/Motinha.png">
<h2>ROTA SPEED</h2>
<p>Carregando Rotas...</p>
</div>

<!-- ========================================================= -->
<!-- LOGIN -->
<!-- ========================================================= -->
<div id="loginBox">

<img class="logo" src="https://i.postimg.cc/XYprkPvs/Motinha.png">

<h1>ROTA SPEED</h1>
<div class="sub">Rastreamento em Tempo Real</div>

<input id="id" placeholder="Seu ID">
<input id="senha" type="password" placeholder="Senha">

<button class="btn-login" onclick="login()">ENTRAR</button>
<button class="btn-cad" onclick="register()">CRIAR CONTA</button>

<div id="status"></div>

</div>

<!-- ========================================================= -->
<!-- PAINEL -->
<!-- ========================================================= -->
<div id="painel">

<div id="map"></div>

<!-- MENU -->
<div id="menuLateral">
<h2 style="margin-bottom:15px;">🏍️ Menu</h2>

<div class="menuItem">💰 Ganhos Hoje</div>
<div class="menuItem">📦 Entregas</div>
<div class="menuItem">⭐ Avaliações</div>
<div class="menuItem" onclick="desligar()">🔴 Sair Serviço</div>

</div>

<!-- TOPO -->
<div id="topo">

<button id="menuBtn" onclick="abrirMenu()">☰</button>

<div id="saldo">R$ 0,00</div>

</div>

<!-- LADO -->
<div id="sideBtns">
<button class="miniBtn">🔔</button>
<button class="miniBtn" onclick="centralizar()">📍</button>
</div>

<!-- ONLINE OFFLINE -->
<div id="livreBox">
<button id="btnLivre" onclick="ficarLivre()">🔴 Offline</button>
</div>

<!-- RODAPE -->
<div id="footerMoto">
<span id="fraseMoto">Conectando entregadores em tempo real</span>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ========================================================= */
/* VARIAVEIS */
/* ========================================================= */
const API = "https://zeus-delivery.onrender.com";

let watchId = null;
let gpsLoop = null;
let mapa = null;
let marker = null;
let userId = "";
let online = false;

let gpsIniciado = false;
let ultimaLat = -20.8113;
let ultimaLng = -49.3758;

/* ========================================================= */
/* 🔋 SISTEMA MOBILE */
/* ========================================================= */
let wakeLock = null;
let ultimoLogin = 0;



/* ========================================================= */
/* 🔋 MANTER TELA LIGADA */
/* ========================================================= */
async function ativarTelaLigada(){

try{

if('wakeLock' in navigator){
wakeLock = await navigator.wakeLock.request('screen');
}

}catch(e){}

}

/* ========================================================= */
/* 🔋 LIBERAR TELA */
/* ========================================================= */
async function soltarTelaLigada(){

try{

if(wakeLock){
await wakeLock.release();
wakeLock = null;
}

}catch(e){}

}

/* ========================================================= */
/* LOADING */
/* ========================================================= */
window.onload = ()=>{

setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2200);

const salvo = localStorage.getItem("motoboy_id");

if(salvo){
document.getElementById("id").value = salvo;
}


const logado = localStorage.getItem("motoboy_logado");

if(logado == "sim" && salvo){

userId = salvo;

document.getElementById("loginBox").style.display="none";
document.getElementById("painel").style.display="block";

iniciarMapa();
setOfflineVisual();

}

};

/* ========================================================= */
/* LOGIN */
/* ========================================================= */
async function login(){

const id = document.getElementById("id").value.trim();
const senha = document.getElementById("senha").value.trim();

if(!id || !senha){
alert("Preencha tudo");
return;
}

const res = await fetch(API + '/login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id,senha})
});

const data = await res.json();

if(data.error){
alert(data.error);
return;
}

localStorage.setItem("motoboy_id",id);
localStorage.setItem("motoboy_logado","sim");

userId = id;

/* abre painel */
document.getElementById("loginBox").style.display="none";
document.getElementById("painel").style.display="block";

/* inicia mapa */
iniciarMapa();

/* começa offline */
setOfflineVisual();

}

/* ========================================================= */
/* CADASTRO */
/* ========================================================= */
async function register(){

const id = document.getElementById("id").value.trim();
const senha = document.getElementById("senha").value.trim();

if(!id || !senha){
alert("Preencha tudo");
return;
}

const res = await fetch(API + '/register',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id,senha})
});

const data = await res.json();

if(data.error){
alert(data.error);
return;
}

alert("Conta criada com sucesso 🚀");

}

/* ========================================================= */
/* MAPA */
/* ========================================================= */
function iniciarMapa(){

if(mapa) return;

mapa = L.map('map').setView([-20.8113,-49.3758],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(mapa);

marker = L.marker([-20.8113,-49.3758]).addTo(mapa);

}


/* ========================================================= */
/* 📍 GPS FORTE ANDROID / APK */
/* ========================================================= */
async function startGPS(){

if(gpsIniciado) return;
gpsIniciado = true;

watchId = navigator.geolocation.watchPosition((pos)=>{

ultimaLat = pos.coords.latitude;
ultimaLng = pos.coords.longitude;

enviarLocal(ultimaLat,ultimaLng);

},()=>{

document.getElementById("status").innerHTML =
"⚠️ GPS indisponível";

},{
enableHighAccuracy:true,
maximumAge:5000,
timeout:10000
});

/* heartbeat */
if(gpsLoop) clearInterval(gpsLoop);

gpsLoop = setInterval(()=>{

if(!online) return;

enviarLocal(ultimaLat,ultimaLng);

},15000);

}



/* ========================================================= */
/* ENVIAR LOCAL */
/* ========================================================= */
function enviarLocal(lat,lng){

if(marker){
marker.setLatLng([lat,lng]);
}

if(mapa){
mapa.setView([lat,lng],18);
}

fetch(API + '/location',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
id:userId,
lat:lat,
lng:lng
})
});

document.getElementById("status").innerHTML =
"🟢 Online - Enviando localização";

}

/* ========================================================= */
/* BOTAO ONLINE OFFLINE */
/* ========================================================= */
async function ficarLivre(){

/* =========================
🟢 FICAR ONLINE
========================= */
if(!online){

online = true;

/* visual */
setOnlineVisual();

/* manter tela ligada */
await ativarTelaLigada();

/* iniciar gps web normal */
startGPS();

/* envia ponto inicial */
enviarLocal(ultimaLat, ultimaLng);

/* iniciar service android real */
if(window.Capacitor){

try{

await Capacitor.Plugins.RotaSpeed.startService();

}catch(e){
console.log(e);
}

}

return;
}

/* =========================
🔴 FICAR OFFLINE
========================= */
online = false;
gpsIniciado = false;

/* liberar tela */
await soltarTelaLigada();

/* parar gps web */
if(watchId){
navigator.geolocation.clearWatch(watchId);
watchId = null;
}

/* parar heartbeat */
if(gpsLoop){
clearInterval(gpsLoop);
gpsLoop = null;
}

/* avisar servidor */
try{

await fetch(API + '/offline',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
id:userId
})
});

}catch(e){}

/* parar service android */
if(window.Capacitor){

try{

await Capacitor.Plugins.RotaSpeed.stopService();

}catch(e){
console.log(e);
}

}

/* visual */
setOfflineVisual();

}

/* ========================================================= */
/* VISUAL ONLINE */
/* ========================================================= */
function setOnlineVisual(){

document.getElementById("btnLivre").innerHTML = "🟢 Online";
document.getElementById("btnLivre").style.background = "#16a34a";

}

/* ========================================================= */
/* VISUAL OFFLINE */
/* ========================================================= */
function setOfflineVisual(){

document.getElementById("btnLivre").innerHTML = "🔴 Offline";
document.getElementById("btnLivre").style.background = "#ef4444";

document.getElementById("status").innerHTML =
"🔴 Offline";

}

/* ========================================================= */
/* CENTRALIZAR */
/* ========================================================= */
function centralizar(){

if(marker && mapa){
mapa.setView(marker.getLatLng(),18);
}

}

/* ========================================================= */
/* MENU */
/* ========================================================= */
function abrirMenu(){

document.getElementById("menuLateral").classList.toggle("ativo");

}

/* ========================================================= */
/* SAIR SERVIÇO */
/* ========================================================= */
async function desligar(){

await ficarLivre();

document.getElementById("menuLateral")
.classList.remove("ativo");

}


/* ========================================================= */
/* 📱 VOLTOU PRA TELA */
/* ========================================================= */
document.addEventListener("visibilitychange", async()=>{

if(!document.hidden && online){

await ativarTelaLigada();

gpsIniciado = false;
startGPS();

enviarLocal(ultimaLat,ultimaLng);

}

});

/* ========================================================= */
/* 🌐 INTERNET OFF */
/* ========================================================= */
window.addEventListener("offline",()=>{

document.getElementById("status").innerHTML =
"📡 Sem internet";

});

/* ========================================================= */
/* 🌐 INTERNET VOLTOU */
/* ========================================================= */
window.addEventListener("online",()=>{

document.getElementById("status").innerHTML =
"📡 Internet reconectada";

if(online){

gpsIniciado = false;
startGPS();
enviarLocal(ultimaLat,ultimaLng);

}

});


/* ========================================================= */
/* FRASES */
/* ========================================================= */
const frasesMoto = [
"Conectando entregadores em tempo real",
"Ganhe mais ficando online",
"Entregas rápidas. Clientes felizes.",
"Seu mapa atualizado ao vivo",
"ROTA SPEED © 2026",
"Fique livre e receba pedidos"
];

let fraseIndexMoto = 0;

setInterval(()=>{

fraseIndexMoto++;

if(fraseIndexMoto >= frasesMoto.length){
fraseIndexMoto = 0;
}

document.getElementById("fraseMoto").innerText =
frasesMoto[fraseIndexMoto];

},4000);

/* ========================================================= */
/* 📱 PWA SERVICE WORKER */
/* ========================================================= */
if('serviceWorker' in navigator){

navigator.serviceWorker.register('/motoboy/sw.js')
.then(()=>console.log("PWA ativo"))
.catch(()=>console.log("Erro PWA"));

}


</script>
</body>




</html>
