<!DOCTYPE html>
<html>
<head>
    <title>ROTA SPEED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin:0;
            font-family: Arial;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card {
            background:#111827;
            padding:30px;
            border-radius:15px;
            width:90%;
            max-width:350px;
            text-align:center;
            box-shadow:0 0 25px rgba(0,0,0,0.6);
        }

        input {
            width:100%;
            padding:12px;
            border-radius:10px;
            border:none;
            margin-bottom:10px;
        }

        button {
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#22c55e;
            color:white;
            font-weight:bold;
            margin-top:5px;
        }

        .btn-sec {
            background:#374151;
        }

        .status {
            margin-top:15px;
            font-size:14px;
        }

        /* 🔥 LOADING */
        #loading{
            position:fixed;
            width:100%;
            height:100%;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            z-index:9999;
        }

        #loading img{
            width:130px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse{
            0%{transform:scale(1);}
            50%{transform:scale(1.1);}
            100%{transform:scale(1);}
        }
    </style>
</head>
<body>

<!-- 🔥 LOADING -->
<div id="loading">
    <img src="https://media.discordapp.net/attachments/1367096565725921411/1488934574275690506/Motinha.png">
    <h2>ROTA SPEED</h2>
    <p>Carregando Rotas...</p>
</div>

<div class="card">

    <img src="https://i.imgur.com/yEAsQcy.png" width="60">

    <h1>ROTA SPEED</h1>
    <p>Rastreamento em tempo Real</p>

    <input id="id" placeholder="Seu ID">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="login()">ENTRAR</button>
    <button class="btn-sec" onclick="register()">CRIAR CONTA</button>

    <div class="status" id="status"></div>

</div>

<script>

let watchId = null;

// 🔁 AUTO LOGIN + LOADING
window.onload = () => {

    setTimeout(()=>{
        document.getElementById("loading").style.display = "none";
    },2000);

    const saved = localStorage.getItem("motoboy_id");

    if(saved){
        document.getElementById("id").value = saved;
    }
};

// =====================
// 🔐 LOGIN
// =====================
async function login(){

    const id = document.getElementById("id").value;
    const senha = document.getElementById("senha").value;

    if(!id || !senha){
        alert("Preencha tudo");
        return;
    }

    const res = await fetch('/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ id, senha })
    });

    const data = await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    localStorage.setItem("motoboy_id", id);

    startTracking(id);
}

// =====================
// 🧑‍💻 CADASTRO
// =====================
async function register(){

    const id = document.getElementById("id").value;
    const senha = document.getElementById("senha").value;

    if(!id || !senha){
        alert("Preencha tudo");
        return;
    }

    const res = await fetch('/register',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ id, senha })
    });

    const data = await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    alert("Conta criada com sucesso 🚀");
}

// =====================
// 📡 TRACKING
// =====================
function startTracking(id){

    if(watchId){
        navigator.geolocation.clearWatch(watchId);
    }

    watchId = navigator.geolocation.watchPosition((pos)=>{

        fetch('/location',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                id:id,
                lat:pos.coords.latitude,
                lng:pos.coords.longitude
            })
        });

        document.getElementById("status").innerHTML = "🟢 Online - Enviando localização";

    },()=>{
        document.getElementById("status").innerHTML = "❌ GPS negado";
    },{
        enableHighAccuracy:true
    });

    document.getElementById("status").innerHTML = "✅ Conectado";
}

</script>

</body>
</html>
