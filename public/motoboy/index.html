<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Motoboy</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:#fff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:95%;
    max-width:380px;
    background:#111827;
    padding:25px;
    border-radius:15px;
}

input,button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    background:#22c55e;
    color:#fff;
    font-weight:bold;
}

.off{
    background:#ef4444;
}

#status{
    margin-top:15px;
}
</style>
</head>
<body>

<div class="card">

<h2>🏍️ Painel Motoboy</h2>

<input id="id" placeholder="Seu ID">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">ENTRAR TRABALHAR</button>
<button onclick="register()">CRIAR CONTA</button>
<button class="off" onclick="desligar()">SAIR DE SERVIÇO</button>

<div id="status"></div>

</div>

<script>

const API = window.location.origin;

let watchId = null;

// =========================================================
// LOGIN
// =========================================================
async function login(){

const id = document.getElementById("id").value;
const senha = document.getElementById("senha").value;

const res = await fetch(API+'/login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id,senha})
});

const data = await res.json();

if(data.error){
    return alert(data.error);
}

startGPS(id);

}

// =========================================================
// CADASTRO
// =========================================================
async function register(){

const id = document.getElementById("id").value;
const senha = document.getElementById("senha").value;

const res = await fetch(API+'/register',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id,senha})
});

const data = await res.json();

if(data.error){
    return alert(data.error);
}

alert("Conta criada");

}

// =========================================================
// GPS ONLINE
// =========================================================
function startGPS(id){

if(watchId){
navigator.geolocation.clearWatch(watchId);
}

watchId = navigator.geolocation.watchPosition((pos)=>{

fetch(API+'/location',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
id:id,
lat:pos.coords.latitude,
lng:pos.coords.longitude
})
});

document.getElementById("status").innerHTML="🟢 Online";

},()=>{

document.getElementById("status").innerHTML="❌ GPS bloqueado";

},{
enableHighAccuracy:true,
maximumAge:0
});

}

// =========================================================
// OFFLINE
// =========================================================
async function desligar(){

const id = document.getElementById("id").value;

if(watchId){
navigator.geolocation.clearWatch(watchId);
}

await fetch(API+'/offline',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id})
});

document.getElementById("status").innerHTML="🔴 Offline";

}

</script>
</body>
</html>
