<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ROTA SPEED - Motoboy</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1603023168849-1f0f2c1d6d78');
    background-size:cover;
    background-position:center;
    color:white;
}

/* SCREENS */
.screen{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{display:flex;}

/* LOADING */
#loading img{
    width:130px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:0.5;}
    50%{opacity:1;}
    100%{opacity:0.5;}
}

/* CARD LOGIN */
.card{
    width:90%;
    max-width:350px;
    background:rgba(0,0,0,0.7);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(12px);
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.logo{
    width:110px;
    margin-bottom:15px;
}

/* INPUT */
input{
    width:100%;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    border:none;
    font-size:16px;
}

/* BOTÃO */
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:bold;
    margin-top:10px;
}

/* CORES */
.green{background:#00c853;}
.red{background:#d50000;}
.blue{background:#2962ff;}

/* APP ESTILO UBER */
#app{
    position:relative;
}

/* CARD INFERIOR */
.bottom-card{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    border-radius:25px 25px 0 0;
    padding:20px;
    box-shadow:0 -5px 20px rgba(0,0,0,0.6);
    animation:slideUp 0.4s ease;
}

@keyframes slideUp{
    from{transform:translateY(100%);}
    to{transform:translateY(0);}
}

.status-title{
    font-size:22px;
    font-weight:bold;
}

.status-sub{
    opacity:0.7;
    margin-bottom:10px;
}

.status{
    margin:15px 0;
    font-size:14px;
}

.big-button{
    width:100%;
    padding:18px;
    border-radius:15px;
    border:none;
    font-size:16px;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>
<body>

<!-- 🔄 LOADING -->
<div id="loading" class="screen active">
    <img src="https://i.imgur.com/kkjBM71.png">
    <h2>Carregando Rotas...</h2>
</div>

<!-- 🔐 LOGIN -->
<div id="login" class="screen">
    <div class="card">

        <img class="logo" src="https://i.imgur.com/Ce2wIT5.png">

        <h2>ROTA SPEED</h2>
        <p>Motoboy</p>

        <input id="id" placeholder="Seu ID">

        <button class="green" onclick="entrar()">🚀 Entrar</button>

    </div>
</div>

<!-- 🏍️ APP -->
<div id="app" class="screen">

    <!-- FUNDO ESCURO -->
    <div style="position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.5);"></div>

    <!-- CARD ESTILO APP -->
    <div class="bottom-card">

        <div class="status-title">🏍️ Em Rota</div>
        <div class="status-sub">Você está online</div>

        <div class="status" id="status">
            🛰️ Atualizando posição em tempo real...
        </div>

        <button class="big-button blue" onclick="cheguei()">
            📍 Cheguei
        </button>

        <button class="big-button green" onclick="finalizar()">
            ✅ Finalizar Entrega
        </button>

        <button class="big-button red" onclick="parar()">
            ⛔ Parar Rota
        </button>

    </div>

</div>

<!-- 🔊 SOM -->
<audio id="som" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

let watchId = null;

/* LOADING */
setTimeout(()=>{
    document.getElementById("loading").classList.remove("active");
    document.getElementById("login").classList.add("active");

    const saved = localStorage.getItem("motoboy_id");
    if(saved){
        document.getElementById("id").value = saved;
    }
},2000);

/* LOGIN */
function entrar(){

    const id = document.getElementById("id").value;

    if(!id){
        alert("Digite seu ID");
        return;
    }

    localStorage.setItem("motoboy_id", id);

    document.getElementById("login").classList.remove("active");
    document.getElementById("app").classList.add("active");

    iniciarRastreamento(id);
}

/* RASTREAMENTO (INTACTO) */
function iniciarRastreamento(id){

    if(watchId){
        navigator.geolocation.clearWatch(watchId);
    }

    watchId = navigator.geolocation.watchPosition((pos)=>{

        fetch('/location',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                id:id,
                lat:pos.coords.latitude,
                lng:pos.coords.longitude
            })
        });

        document.getElementById("status").innerHTML =
        "🛰️ Atualizando posição em tempo real...";

    },(err)=>{
        alert("Erro GPS: "+err.message);
    },{
        enableHighAccuracy:true
    });

    document.getElementById("status").innerHTML =
    "✅ Rastreamento ativo";
}

/* AÇÕES */
function tocar(){
    document.getElementById("som").play();
}

function cheguei(){
    document.getElementById("status").innerHTML = "📍 Chegou no local";
    tocar();
}

function finalizar(){
    document.getElementById("status").innerHTML = "✅ Entrega finalizada";
    tocar();
}

function parar(){

    if(watchId){
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
    }

    document.getElementById("app").classList.remove("active");
    document.getElementById("login").classList.add("active");

    document.getElementById("status").innerHTML =
    "Rastreamento parado";
}

</script>

</body>
</html>
