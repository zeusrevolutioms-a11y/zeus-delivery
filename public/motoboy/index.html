<!DOCTYPE html>
<html>
<head>
    <title>ROTA SPEED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin:0;
            font-family: Arial;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card {
            background:#111827;
            padding:30px;
            border-radius:15px;
            width:90%;
            max-width:350px;
            text-align:center;
            box-shadow:0 0 25px rgba(0,0,0,0.6);
        }

        input {
            width:100%;
            padding:12px;
            border-radius:10px;
            border:none;
            margin-bottom:15px;
        }

        button {
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#22c55e;
            color:white;
            font-weight:bold;
        }

        .status {
            margin-top:15px;
            font-size:14px;
        }

        /* 🔥 LOADING */
        #loading{
            position:fixed;
            width:100%;
            height:100%;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            z-index:9999;
        }

        #loading img{
            width:80px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse{
            0%{transform:scale(1);}
            50%{transform:scale(1.1);}
            100%{transform:scale(1);}
        }
    </style>
</head>
<body>

<!-- 🔥 LOADING -->
<div id="loading">
    <img src="https://i.imgur.com/kkjBM71.png">
    <h2>ROTA SPEED</h2>
    <p>Carregando Rotas Speed...</p>
</div>

<div class="card">

    <img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png" width="60">

    <h1>ROTA SPEED</h1>
    <p>Rastreamento em tempo Real</p>

    <input id="id" placeholder="Seu ID">

    <button onclick="start()">ENTRAR</button>

    <div class="status" id="status"></div>

</div>

<script>

let watchId = null;

// 🔁 AUTO LOGIN + LOADING
window.onload = () => {

    setTimeout(()=>{
        document.getElementById("loading").style.display = "none";
    },2000);

    const saved = localStorage.getItem("motoboy_id");

    if(saved){
        document.getElementById("id").value = saved;
        start();
    }
};

function start(){

    const id = document.getElementById("id").value;

    if(!id){
        alert("Digite seu ID");
        return;
    }

    localStorage.setItem("motoboy_id", id);

    if(watchId){
        navigator.geolocation.clearWatch(watchId);
    }

    watchId = navigator.geolocation.watchPosition((pos)=>{

        fetch('/location',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                id:id,
                lat:pos.coords.latitude,
                lng:pos.coords.longitude
            })
        });

        document.getElementById("status").innerHTML = "🟢 Online - Enviando localização";

    },()=>{
        document.getElementById("status").innerHTML = "❌ GPS negado";
    },{
        enableHighAccuracy:true
    });

    document.getElementById("status").innerHTML = "✅ Conectado";
}

</script>

</body>
</html>
