<!-- 🗺️ PAINEL ADMIN / LOJA - MAPA TEMPO REAL COMPLETO -->
<!-- 📌 Arquivo: public/painel.html -->
<!-- ✅ Motinha animada -->
<!-- ✅ Busca entregador -->
<!-- ✅ Online só quando motoboy desligar -->
<!-- ========================================================= -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel Delivery</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0f172a;
color:#fff;
overflow:hidden;
}

/* LOADING */
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#loading img{
width:140px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* TOPO */
#topbar{
height:80px;
background:#111827;
display:flex;
align-items:center;
padding:10px;
gap:10px;
}

#logo{
width:55px;
border-radius:10px;
}

#search{
padding:12px;
border:none;
border-radius:10px;
width:220px;
}

button{
padding:12px 15px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* MAPA */
#map{
height:calc(100vh - 80px);
width:100%;
}

/* LISTA FLUTUANTE */
#list{
position:absolute;
top:90px;
right:10px;
width:260px;
max-height:500px;
overflow:auto;
z-index:999;
}

.item{
background:#111827ee;
padding:12px;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
}

.item:hover{
background:#1f2937;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
<img src="https://i.postimg.cc/XYprkPvs/Motinha.png">
<h2>ROTA SPEED</h2>
<p>Carregando Painel...</p>
</div>

<!-- TOPO -->
<div id="topbar">

<img id="logo" src="https://i.imgur.com/yEAsQcy.png">

<input id="search" placeholder="Buscar motoboy">

<button onclick="buscar()">Buscar</button>

</div>

<!-- MAPA -->
<div id="map"></div>

<!-- LISTA -->
<div id="list"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2200);

// MAPA
const map = L.map('map').setView([-20.8113,-49.3758],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ICON
const motoIcon = L.icon({
iconUrl:'https://i.postimg.cc/XYprkPvs/Motinha.png',
iconSize:[120,120],
iconAnchor:[60,60]
});

let markers = {};
let animando = {};

// BUSCAR
function buscar(){

const id = document.getElementById("search").value;

if(markers[id]){
map.setView(markers[id].getLatLng(),18);
markers[id].openPopup();
}else{
alert("Não encontrado");
}

}

// FOCAR
function focar(id){

if(markers[id]){
map.setView(markers[id].getLatLng(),18);
markers[id].openPopup();
}

}

// ENDEREÇO
async function endereco(lat,lng){

try{

const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
const j = await r.json();

return j.display_name || "Sem endereço";

}catch{
return "Sem endereço";
}

}

// ANIMAR
function mover(marker,nlat,nlng,id){

if(animando[id]) clearInterval(animando[id]);

const atual = marker.getLatLng();

let i=0;
let total=25;

const slat = (nlat-atual.lat)/total;
const slng = (nlng-atual.lng)/total;

animando[id] = setInterval(()=>{

i++;

marker.setLatLng([
atual.lat + slat*i,
atual.lng + slng*i
]);

if(i>=total) clearInterval(animando[id]);

},100);

}

// UPDATE
async function atualizar(){

const r = await fetch('/motoboys');
const data = await r.json();

let html = "";

for(let id in data){

const m = data[id];

html += `
<div class="item" onclick="focar('${id}')">
🏍️ ${id}<br>
${m.online ? '🟢 Online':'🔴 Offline'}
</div>
`;

const end = await endereco(m.lat,m.lng);

if(!markers[id]){

markers[id] = L.marker([m.lat,m.lng],{
icon:motoIcon
}).addTo(map);

}else{

mover(markers[id],m.lat,m.lng,id);

}

markers[id].setPopupContent(`
<b>🏍️ ${id}</b><br>
${m.online ? '🟢 Online':'🔴 Offline'}<br><br>
📍 ${end}
`);

}

document.getElementById("list").innerHTML = html;

}

setInterval(atualizar,3000);
atualizar();

</script>

</body>
</html>
