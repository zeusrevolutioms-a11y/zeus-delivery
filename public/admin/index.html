<!DOCTYPE html>
<html>
<head>
    <title>Painel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body { font-family: Arial; }
        #map { height: 500px; }

        #topbar {
            padding: 10px;
            background: #111;
            color: white;
        }

        input {
            padding: 5px;
            margin-right: 5px;
        }

        button {
            padding: 6px;
            cursor: pointer;
        }

        #list {
            margin-top: 10px;
        }

        .item {
            background: #eee;
            padding: 5px;
            margin: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="topbar">
    🔎 Buscar motoboy:
    <input id="search" placeholder="ID">
    <button onclick="buscar()">Buscar</button>
</div>

<div id="map"></div>

<div id="list"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 📍 Rio Preto
const map = L.map('map').setView([-20.8113, -49.3758], 13);

// 🌍 mapa
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🏍️ ícone (SEU ORIGINAL MANTIDO)
const motoIcon = L.icon({
    iconUrl: 'https://media.discordapp.net/attachments/1367096565725921411/1488934574275690506/Motinha.png?ex=69ce95e1&is=69cd4461&hm=663dcfd59780f33b4bb8014562223687ca1826710168102d87457a09dd2b704a&=&format=webp&quality=lossless&width=814&height=543',
    iconSize: [100, 100]
});

let markers = {};
let dadosAtuais = {};

// 🔎 buscar motoboy
function buscar() {
    const id = document.getElementById("search").value;

    if (markers[id]) {
        map.setView(markers[id].getLatLng(), 17);
        markers[id].openPopup();
    } else {
        alert("Motoboy não encontrado");
    }
}

// 📍 endereço
async function getEndereco(lat, lng) {
    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
        const data = await res.json();
        return data.display_name;
    } catch {
        return "Endereço não encontrado";
    }
}

// 🔄 atualizar
setInterval(async () => {

    const res = await fetch('/motoboys');
    const data = await res.json();

    dadosAtuais = data;

    let listaHTML = "";

    for (let id in data) {

        const { lat, lng, online } = data[id];

        // 🔥 LISTA COM STATUS
        listaHTML += `
        <div class="item" onclick="focar('${id}')">
            🏍️ Motoboy ${id} ${online ? "🟢" : "🔴"}
        </div>`;

        // ============================
        // NOVO MARKER
        // ============================
        if (!markers[id]) {

            const marker = L.marker([lat, lng], { icon: motoIcon }).addTo(map);

            const endereco = await getEndereco(lat, lng);

            marker.bindPopup(`
                🏍️ Motoboy: ${id} <br>
                📍 ${endereco} <br>
                ${online ? "🟢 ONLINE" : "🔴 OFFLINE"}
            `);

            markers[id] = marker;

        } else {

            // 🔥 atualiza posição
            markers[id].setLatLng([lat, lng]);

            // 🔥 ATUALIZA POPUP (IMPORTANTE)
            const endereco = await getEndereco(lat, lng);

            markers[id].setPopupContent(`
                🏍️ Motoboy: ${id} <br>
                📍 ${endereco} <br>
                ${online ? "🟢 ONLINE" : "🔴 OFFLINE"}
            `);
        }
    }

    document.getElementById("list").innerHTML = listaHTML;

}, 3000);

// 🎯 focar
function focar(id) {
    if (markers[id]) {
        map.setView(markers[id].getLatLng(), 17);
        markers[id].openPopup();
    }
}

</script>

</body>
</html>
