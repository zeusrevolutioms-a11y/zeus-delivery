<!-- ========================================================= -->
<!-- 🗺️ PAINEL DELIVERY -->
<!-- 📌 POPUP VOLTADO IGUAL PRINT ANTIGA -->
<!-- ✅ NÃO REMOVE NADA -->
<!-- ✅ Só muda popup para modelo simples branco -->
<!-- ========================================================= -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel Delivery</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0f172a;
color:#fff;
overflow:hidden;
}

/* LOADING */
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#loading img{
width:140px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* TOPO */
#topbar{
height:80px;
background:#111827;
display:flex;
align-items:center;
padding:10px;
gap:10px;
}

#logo{
width:55px;
border-radius:10px;
}

#search{
padding:12px;
border:none;
border-radius:10px;
width:220px;
}

button{
padding:12px 15px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-weight:bold;
cursor:pointer;
}

#menu{
display:flex;
gap:8px;
margin-left:auto;
}

.menu-btn{
background:#1f2937;
padding:10px 12px;
font-size:13px;
border-radius:10px;
}

.menu-btn:hover{
background:#374151;
}

#footer{
position:fixed;
bottom:0;
left:0;
width:100%;
height:32px;
background:#111827;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
z-index:9999;
color:#cbd5e1;
}

/* MAPA */
#map{
height:calc(100vh - 80px);
width:100%;
}


#pedidosBox{
position:fixed;
top:90px;
left:20px;
width:300px;
max-height:calc(100vh - 140px);
overflow-y:auto;
background:#111827;
padding:16px;
border-radius:15px;
z-index:9999;
display:none;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

#pedidosBox::-webkit-scrollbar{
width:8px;
}

#pedidosBox::-webkit-scrollbar-track{
background:#0f172a;
border-radius:10px;
}

#pedidosBox::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:10px;
}

#pedidosBox h2{
margin-bottom:15px;
font-size:22px;
}

#pedidosBox input,
#pedidosBox select{
width:100%;
padding:9px;
margin-bottom:8px;
border:none;
border-radius:10px;
font-size:14px;
}

#pedidosBox button{
width:100%;
margin-top:8px;
}


/* LISTA */
#list{
position:absolute;
top:90px;
right:10px;
width:260px;
max-height:500px;
overflow:auto;
z-index:999;
}

#list::-webkit-scrollbar{
width:8px;
}

#list::-webkit-scrollbar-track{
background:#111827;
border-radius:10px;
}

#list::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:10px;
}

.item{
background:#111827ee;
padding:12px;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.item:hover{
background:#1f2937;
}


#listaPedidosBox{
position:fixed;
top:90px;
left:340px;
width:420px;
max-height:calc(100vh - 140px);
overflow-y:auto;
background:#111827;
padding:16px;
border-radius:15px;
z-index:9999;
display:none;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

#listaPedidosBox::-webkit-scrollbar{
width:8px;
}

#listaPedidosBox::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:10px;
}

.pedidoItem{
background:#1f2937;
padding:12px;
border-radius:12px;
margin-bottom:10px;
font-size:14px;
line-height:1.5;
}


#rotasBox{
position:fixed;
top:90px;
left:20px;
right:20px;
bottom:40px;
background:#111827;
border-radius:15px;
padding:20px;
display:none;
overflow-y:auto;
z-index:9999;
box-shadow:0 0 25px rgba(0,0,0,.5);
}

#rotasBox::-webkit-scrollbar{
width:8px;
}

#rotasBox::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:10px;
}

.pedidoItem{
background:#1f2937;
padding:14px;
margin-bottom:10px;
border-radius:12px;
font-size:15px;
line-height:1.6;
}


</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
<img src="https://i.postimg.cc/XYprkPvs/Motinha.png">
<h2>ROTA SPEED</h2>
<p>Carregando Painel...</p>
</div>

<!-- TOPO -->
<div id="topbar">

<img id="logo" src="https://i.imgur.com/yEAsQcy.png">

<input id="search" placeholder="Buscar motoboy">

<button onclick="buscar()">Buscar</button>

<div id="menu">

<button class="menu-btn">🏠 Início</button>
<button class="menu-btn">🏍️ Entregadores</button>
<button class="menu-btn" onclick="abrirPedidos()">📦 Pedidos</button>
<button class="menu-btn">📊 Relatórios</button>
<button class="menu-btn">⚙️ Config</button>
<button class="menu-btn" onclick="abrirRotas()">🚚 Rotas</button>

</div>
</div>

<!-- MAPA -->

<!-- MAPA -->
<div id="map"></div>

<!-- LISTA -->
<div id="list"></div>


<!-- PEDIDOS -->
<div id="pedidosBox">

<!-- ========================================================= -->
<!-- 📋 LISTA PEDIDOS ENVIADOS -->
<!-- ========================================================= -->
<div id="listaPedidosBox"></div>

<h2>📦 Novo Pedido</h2>

<input id="pedido_codigo" placeholder="Código Pedido">
<input id="pedido_cliente" placeholder="Nome Cliente">
<input id="pedido_rua" placeholder="Rua">
<input id="pedido_numero" placeholder="Número">
<input id="pedido_bairro" placeholder="Bairro">
<input id="pedido_km" placeholder="KM" readonly>
<input id="pedido_taxa" placeholder="Taxa Ex: 8.00">



<select id="pedido_motoboy">
<option value="">Selecionar entregador</option>
</select>

<button onclick="buscarEndereco()">📍 Buscar Endereço</button>

<button onclick="salvarPedido()">🚀 Disparar Pedido</button>
<button onclick="fecharPedidos()">Fechar</button>

</div>

<!-- ========================================================= -->
<!-- 🚚 PAINEL ROTAS -->
<!-- ========================================================= -->
<div id="rotasBox"></div>

<div id="footer">
<span id="frase">Conectando lojas e entregadores em tempo real</span>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>



<script>

// =========================================================
// LOADING
// =========================================================
setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2200);

// =========================================================
// MAPA
// =========================================================
const map = L.map('map').setView([-20.8113,-49.3758],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// =========================================================
// ICON
// =========================================================
const motoIcon = L.icon({
iconUrl:'https://i.postimg.cc/XYprkPvs/Motinha.png',
iconSize:[120,120],
iconAnchor:[60,60]
});

let markers = {};
let animando = {};

// =========================================================
// BUSCAR
// =========================================================
function buscar(){

const id = document.getElementById("search").value.trim();

if(markers[id]){
map.setView(markers[id].getLatLng(),18);
markers[id].openPopup();
}else{
alert("Motoboy não encontrado");
}

}

// =========================================================
// FOCAR
// =========================================================
function focar(id){

if(markers[id]){
map.setView(markers[id].getLatLng(),18);
markers[id].openPopup();
}

}

// =========================================================
// ENDEREÇO
// =========================================================
async function endereco(lat,lng){

try{

const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
const j = await r.json();

return j.display_name || "Sem endereço";

}catch{
return "Sem endereço";
}

}

// =========================================================
// MOVER
// =========================================================
function mover(marker,nlat,nlng,id){

if(animando[id]) clearInterval(animando[id]);

const atual = marker.getLatLng();

let i = 0;
let total = 25;

const slat = (nlat - atual.lat) / total;
const slng = (nlng - atual.lng) / total;

animando[id] = setInterval(()=>{

i++;

marker.setLatLng([
atual.lat + slat * i,
atual.lng + slng * i
]);

if(i >= total){
clearInterval(animando[id]);
}

},100);

}

// =========================================================
// UPDATE
// =========================================================
async function atualizar(){

const r = await fetch('/motoboys');
const data = await r.json();

let html = "";

for(let id in data){

const m = data[id];

// endereço sempre pega
const end = await endereco(m.lat,m.lng);

// ===============================
// LISTA: só online
// ===============================
if(m.online){

html += `
<div class="item" onclick="focar('${id}')">
🏍️ ${id}<br>
🟢 Online
</div>
`;

}

// ===============================
// MARKER
// ===============================
if(!markers[id]){

markers[id] = L.marker([m.lat,m.lng],{
icon:motoIcon
}).addTo(map);

markers[id].on('click',function(){
this.openPopup();
});

}else{

mover(markers[id],m.lat,m.lng,id);

}






// ===============================
// POPUP
// ===============================
const popupHtml = `
🏍️ Motoboy: ${id} <br>
📍 ${end} <br>
${m.online ? '🟢 ONLINE':'🔴 OFFLINE'}
`;

markers[id].bindPopup(popupHtml);
markers[id].setPopupContent(popupHtml);

}

// atualiza lista final
document.getElementById("list").innerHTML = html;

}

// =========================================================
// LOOP
// =========================================================
setInterval(atualizar,3000);
atualizar();



// =========================================================
// BUSCAR ENDEREÇO + KM + TAXA
// =========================================================
async function buscarEndereco(){

const rua = document.getElementById("pedido_rua").value.trim();

if(!rua){
alert("Digite rua e número");
return;
}

try{

const r = await fetch(
`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(rua + ' São José do Rio Preto')}`
);

const data = await r.json();

if(!data[0]){
alert("Endereço não encontrado");
return;
}

const destinoLat = parseFloat(data[0].lat);
const destinoLng = parseFloat(data[0].lon);

// bairro
const partes = data[0].display_name.split(",");
document.getElementById("pedido_bairro").value = partes[1]?.trim() || "";

// usa centro da cidade como base loja (depois trocamos)
const lojaLat = -20.8113;
const lojaLng = -49.3758;

// km
const km = calcularDistancia(lojaLat,lojaLng,destinoLat,destinoLng);

document.getElementById("pedido_km").value = km.toFixed(1) + " km";

// taxa sugerida
let taxa = 6 + (km * 1.2);

if(taxa < 7) taxa = 7;

document.getElementById("pedido_taxa").value = taxa.toFixed(2);

}catch(e){
alert("Erro ao buscar endereço");
}

}

// =========================================================
// CALCULAR DISTÂNCIA
// =========================================================
function calcularDistancia(lat1, lon1, lat2, lon2){

const R = 6371;

const dLat = (lat2-lat1) * Math.PI/180;
const dLon = (lon2-lon1) * Math.PI/180;

const a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2) * Math.sin(dLon/2);

const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return R * c;

}



// =========================================================
// 🚚 ABRIR CENTRAL ROTAS
// =========================================================
async function abrirRotas(){

const box = document.getElementById("rotasBox");

box.style.display = "block";

box.innerHTML = `
<h2 style="margin-bottom:15px;">🚚 Central de Rotas</h2>
<p>Carregando pedidos...</p>
<br>
<button onclick="fecharRotas()">Fechar</button>
`;

try{

const r = await fetch('/pedidos');
const data = await r.json();

let html = `
<h2 style="margin-bottom:15px;">🚚 Central de Rotas</h2>
`;

if(!data || data.length === 0){

html += `
<div class="pedidoItem">
Nenhum pedido enviado ainda.
</div>
`;

}else{

data.forEach(p=>{

let status = "🟡 Aguardando";

if(p.status == "aceito") status = "🟢 Aceito";
if(p.status == "rota") status = "🚚 Em rota";
if(p.status == "finalizado") status = "✅ Finalizado";
if(p.status == "recusado") status = "🔴 Recusado";

html += `
<div class="pedidoItem">
<b>Pedido:</b> ${p.codigo || '-'}<br>
👤 Cliente: ${p.cliente || '-'}<br>
📍 Rua: ${p.rua}<br>
🏘️ Bairro: ${p.bairro}<br>
🏍️ Motoboy: ${p.motoboy || '-'}<br>
💰 Taxa: R$ ${p.taxa || '0'}<br>
${status}
</div>
`;

});

}

html += `
<button onclick="fecharRotas()" style="width:100%;margin-top:10px;">
Fechar
</button>
`;

box.innerHTML = html;

}catch(e){

box.innerHTML = `
<h2>🚚 Central de Rotas</h2>

<div class="pedidoItem">
Erro ao carregar pedidos.
</div>

<button onclick="fecharRotas()" style="width:100%;margin-top:10px;">
Fechar
</button>
`;

}

}

// =========================================================
// ❌ FECHAR ROTAS
// =========================================================
function fecharRotas(){
document.getElementById("rotasBox").style.display = "none";
}


// =========================================================
// PEDIDOS
// =========================================================

function abrirPedidos(){
document.getElementById("pedidosBox").style.display = "block";
carregarMotoboys();
}

function fecharPedidos(){
document.getElementById("pedidosBox").style.display = "none";
}

function carregarMotoboys(){

let html = '<option value="">Selecionar entregador</option>';

for(let id in markers){
html += `<option value="${id}">${id}</option>`;
}

document.getElementById("pedido_motoboy").innerHTML = html;

}

// =========================================================
// 🚀 ENVIAR PEDIDO REAL MYSQL
// =========================================================
async function salvarPedido(){

const pedido = {
codigo: document.getElementById("pedido_codigo").value,
cliente: document.getElementById("pedido_cliente").value,
rua: document.getElementById("pedido_rua").value,
bairro: document.getElementById("pedido_bairro").value,
km: document.getElementById("pedido_km").value,
taxa: document.getElementById("pedido_taxa").value,
motoboy: document.getElementById("pedido_motoboy").value
};

const r = await fetch('/pedido',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(pedido)
});

const data = await r.json();

if(data.error){
alert("Erro ao enviar pedido");
return;
}

alert("🚀 Pedido salvo com sucesso!");

fecharPedidos();

}


// FRASES RODAPÉ
const frases = [
"Conectando lojas e entregadores em tempo real",
"Taxas justas. Entregas rápidas.",
"Plataforma inteligente para delivery moderno",
"ROTA SPEED © 2026"
];

let fraseIndex = 0;

setInterval(()=>{

fraseIndex++;

if(fraseIndex >= frases.length){
fraseIndex = 0;
}

document.getElementById("frase").innerText = frases[fraseIndex];

},4000);


</script>



</body>
</html>
