<!DOCTYPE html>
<html>
<head>
<title>ROTA SPEED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card{
    background:#111827;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    margin-top:5px;
}

.link{
    margin-top:10px;
    font-size:13px;
    color:#9ca3af;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h1>ROTA SPEED</h1>

<div id="loginBox">
<input id="id" placeholder="ID">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">ENTRAR</button>

<div class="link" onclick="showRegister()">Criar conta</div>
</div>

<div id="registerBox" style="display:none">
<input id="rid" placeholder="Novo ID">
<input id="rsenha" type="password" placeholder="Senha">
<button onclick="register()">CADASTRAR</button>

<div class="link" onclick="showLogin()">Voltar</div>
</div>

<div id="status"></div>

</div>

<script>

let watchId = null;

// LOGIN
async function login(){

    const id = document.getElementById("id").value;
    const senha = document.getElementById("senha").value;

    const res = await fetch('/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id,senha})
    });

    const data = await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    localStorage.setItem("id", id);

    iniciarGPS(id);
}

// CADASTRO
async function register(){

    const id = document.getElementById("rid").value;
    const senha = document.getElementById("rsenha").value;

    const res = await fetch('/register',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id,senha})
    });

    const data = await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    alert("Conta criada!");
    showLogin();
}

// GPS
function iniciarGPS(id){

    watchId = navigator.geolocation.watchPosition((pos)=>{

        fetch('/location',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                id,
                lat:pos.coords.latitude,
                lng:pos.coords.longitude
            })
        });

        document.getElementById("status").innerHTML = "🟢 Online";

    },()=>{
        document.getElementById("status").innerHTML = "❌ GPS negado";
    },{
        enableHighAccuracy:true
    });
}

// UI
function showRegister(){
    loginBox.style.display="none";
    registerBox.style.display="block";
}

function showLogin(){
    loginBox.style.display="block";
    registerBox.style.display="none";
}

</script>

</body>
</html>
