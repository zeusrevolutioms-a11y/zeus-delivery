<!-- 🗺️ PAINEL ADMIN / LOJA - MAPA TEMPO REAL COMPLETO -->
<!-- 📌 Arquivo: public/painel.html -->
<!-- ✅ Motinha animada -->
<!-- ✅ Busca entregador -->
<!-- ✅ Online só quando motoboy desligar -->
<!-- ========================================================= -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel Delivery</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:#fff;
}

#topbar{
    background:#111827;
    padding:15px;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

#topbar input{
    padding:10px;
    border:none;
    border-radius:8px;
    width:220px;
}

#topbar button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
}

#map{
    height:75vh;
}

#list{
    background:#111827;
    padding:10px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:8px;
}

.item{
    background:#1f2937;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.item:hover{
    transform:scale(1.02);
    background:#374151;
}
</style>
</head>
<body>

<div id="topbar">
    🔎 <input id="search" placeholder="Buscar ID motoboy">
    <button onclick="buscar()">Buscar</button>
</div>

<div id="map"></div>
<div id="list"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// =========================================================
// 🗺️ MAPA
// =========================================================
const map = L.map('map').setView([-20.8113,-49.3758],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map);

// =========================================================
// 🏍️ ICON MOTO
// =========================================================
const motoIcon = L.icon({
    iconUrl:'https://media.discordapp.net/attachments/1367096565725921411/1488934574275690506/Motinha.png',
    iconSize:[90,90],
    iconAnchor:[45,45]
});

let markers = {};
let animacoes = {};

// =========================================================
// 🔎 BUSCAR
// =========================================================
function buscar(){

    const id = document.getElementById("search").value;

    if(markers[id]){
        map.setView(markers[id].getLatLng(),18);
        markers[id].openPopup();
    }else{
        alert("Motoboy não encontrado.");
    }
}

// =========================================================
// 🎯 FOCAR
// =========================================================
function focar(id){

    if(markers[id]){
        map.setView(markers[id].getLatLng(),18);
        markers[id].openPopup();
    }
}

// =========================================================
// 🏍️ ANIMAÇÃO SUAVE
// =========================================================
function moverSuave(marker,novaLat,novaLng,id){

    if(animacoes[id]){
        clearInterval(animacoes[id]);
    }

    const atual = marker.getLatLng();

    let passos = 30;
    let atualPasso = 0;

    const stepLat = (novaLat - atual.lat) / passos;
    const stepLng = (novaLng - atual.lng) / passos;

    animacoes[id] = setInterval(()=>{

        atualPasso++;

        marker.setLatLng([
            atual.lat + (stepLat * atualPasso),
            atual.lng + (stepLng * atualPasso)
        ]);

        if(atualPasso >= passos){
            clearInterval(animacoes[id]);
        }

    },100);
}

// =========================================================
// 🔄 ATUALIZAÇÃO TEMPO REAL
// =========================================================
async function atualizar(){

    const res = await fetch('/motoboys');
    const data = await res.json();

    let html = "";

    for(let id in data){

        const motoboy = data[id];

        const status = motoboy.online ? "🟢 Online" : "🔴 Offline";

        html += `
            <div class="item" onclick="focar('${id}')">
                🏍️ ${id}<br>
                ${status}
            </div>
        `;

        // NOVO
        if(!markers[id]){

            markers[id] = L.marker(
                [motoboy.lat,motoboy.lng],
                {icon:motoIcon}
            ).addTo(map);

        }else{

            moverSuave(
                markers[id],
                motoboy.lat,
                motoboy.lng,
                id
            );
        }

        markers[id].setPopupContent(`
            🏍️ <b>${id}</b><br>
            ${status}<br>
            📍 ${motoboy.lat.toFixed(5)}, ${motoboy.lng.toFixed(5)}
        `);
    }

    document.getElementById("list").innerHTML = html;
}

setInterval(atualizar,3000);
atualizar();

</script>
</body>
</html>
