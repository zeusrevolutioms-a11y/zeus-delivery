<!DOCTYPE html>
<html>
<head>
<title>ROTA SPEED - PAINEL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body{margin:0;font-family:Arial;}
#map{height:90vh;}

#topbar{
    background:#111;
    color:white;
    padding:10px;
}
</style>
</head>

<body>

<div id="topbar">
🔎 Buscar:
<input id="search">
<button onclick="buscar()">OK</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-20.8113, -49.3758], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const icon = L.icon({
    iconUrl:'https://cdn-icons-png.flaticon.com/512/2972/2972185.png',
    iconSize:[40,40]
});

let markers = {};

setInterval(async()=>{

    const res = await fetch('/motoboys');
    const data = await res.json();

    for(let id in data){

        const {lat,lng} = data[id];

        if(!markers[id]){
            markers[id] = L.marker([lat,lng],{icon}).addTo(map)
            .bindPopup("Motoboy: "+id);
        }else{
            markers[id].setLatLng([lat,lng]);
        }
    }

},3000);

function buscar(){
    const id = document.getElementById("search").value;
    if(markers[id]){
        map.setView(markers[id].getLatLng(),17);
    }
}

</script>

</body>
</html>
