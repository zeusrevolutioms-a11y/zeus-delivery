<!-- ========================================================= -->
<!-- 🗺️ PAINEL DELIVERY -->
<!-- 📌 POPUP VOLTADO IGUAL PRINT ANTIGA -->
<!-- ✅ NÃO REMOVE NADA -->
<!-- ✅ Só muda popup para modelo simples branco -->
<!-- ========================================================= -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel Delivery</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0f172a;
color:#fff;
overflow:hidden;
}

/* LOADING */
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#loading img{
width:140px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* TOPO */
#topbar{
height:80px;
background:#111827;
display:flex;
align-items:center;
padding:10px;
gap:10px;
}

#logo{
width:55px;
border-radius:10px;
}

#search{
padding:12px;
border:none;
border-radius:10px;
width:220px;
}

button{
padding:12px 15px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-weight:bold;
cursor:pointer;
}

#menu{
display:flex;
gap:8px;
margin-left:auto;
}

.menu-btn{
background:#1f2937;
padding:10px 12px;
font-size:13px;
border-radius:10px;
}

.menu-btn:hover{
background:#374151;
}

#footer{
position:fixed;
bottom:0;
left:0;
width:100%;
height:32px;
background:#111827;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
z-index:9999;
color:#cbd5e1;
}

/* MAPA */
#map{
height:calc(100vh - 80px);
width:100%;
}

/* LISTA */
#list{
position:absolute;
top:90px;
right:10px;
width:260px;
max-height:500px;
overflow:auto;
z-index:999;
}

#list::-webkit-scrollbar{
width:8px;
}

#list::-webkit-scrollbar-track{
background:#111827;
border-radius:10px;
}

#list::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:10px;
}

.item{
background:#111827ee;
padding:12px;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.item:hover{
background:#1f2937;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
<img src="https://i.postimg.cc/XYprkPvs/Motinha.png">
<h2>ROTA SPEED</h2>
<p>Carregando Painel...</p>
</div>

<!-- TOPO -->
<div id="topbar">

<img id="logo" src="https://i.imgur.com/yEAsQcy.png">

<input id="search" placeholder="Buscar motoboy">

<button onclick="buscar()">Buscar</button>

<div id="menu">

<button class="menu-btn">🏠 Início</button>
<button class="menu-btn">🏍️ Entregadores</button>
<button class="menu-btn">📦 Pedidos</button>
<button class="menu-btn">📊 Relatórios</button>
<button class="menu-btn">⚙️ Config</button>

</div>
</div>

<!-- MAPA -->

<!-- MAPA -->
<div id="map"></div>

<!-- LISTA -->
<div id="list"></div>

<div id="footer">
<span id="frase">Conectando lojas e entregadores em tempo real</span>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>



<script>

// =========================================================
// LOADING
// =========================================================
setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2200);

// =========================================================
// MAPA
// =========================================================
const map = L.map('map').setView([-20.8113,-49.3758],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// =========================================================
// ICON
// =========================================================
const motoIcon = L.icon({
iconUrl:'https://i.postimg.cc/XYprkPvs/Motinha.png',
iconSize:[120,120],
iconAnchor:[60,60]
});

let markers = {};
let animando = {};

// =========================================================
// BUSCAR
// =========================================================
function buscar(){

const id = document.getElementById("search").value.trim();

if(markers[id]){
map.setView(markers[id].getLatLng(),18);
markers[id].openPopup();
}else{
alert("Motoboy não encontrado");
}

}

// =========================================================
// FOCAR
// =========================================================
function focar(id){

if(markers[id]){
map.setView(markers[id].getLatLng(),18);
markers[id].openPopup();
}

}

// =========================================================
// ENDEREÇO
// =========================================================
async function endereco(lat,lng){

try{

const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
const j = await r.json();

return j.display_name || "Sem endereço";

}catch{
return "Sem endereço";
}

}

// =========================================================
// MOVER
// =========================================================
function mover(marker,nlat,nlng,id){

if(animando[id]) clearInterval(animando[id]);

const atual = marker.getLatLng();

let i = 0;
let total = 25;

const slat = (nlat - atual.lat) / total;
const slng = (nlng - atual.lng) / total;

animando[id] = setInterval(()=>{

i++;

marker.setLatLng([
atual.lat + slat * i,
atual.lng + slng * i
]);

if(i >= total){
clearInterval(animando[id]);
}

},100);

}

// =========================================================
// UPDATE
// =========================================================
async function atualizar(){

const r = await fetch('/motoboys');
const data = await r.json();

let html = "";

for(let id in data){

const m = data[id];

// só mostra online na lista
if(m.online){

html += `
<div class="item" onclick="focar('${id}')">
🏍️ ${id}<br>
🟢 Online
</div>
`;



const end = await endereco(m.lat,m.lng);

// marker novo
if(!markers[id]){

markers[id] = L.marker([m.lat,m.lng],{
icon:motoIcon
}).addTo(map);

markers[id].on('click',function(){
this.openPopup();
});

}else{

mover(markers[id],m.lat,m.lng,id);

}

// =========================================================
// POPUP IGUAL PRINT ANTIGA
// =========================================================
const popupHtml = `
🏍️ Motoboy: ${id} <br>
📍 ${end} <br>
${m.online ? '🟢 ONLINE':'🔴 OFFLINE'}
`;

markers[id].bindPopup(popupHtml);
markers[id].setPopupContent(popupHtml);

}

document.getElementById("list").innerHTML = html;

}

// =========================================================
// LOOP
// =========================================================
setInterval(atualizar,3000);
atualizar();

// FRASES RODAPÉ
const frases = [
"Conectando lojas e entregadores em tempo real",
"Taxas justas. Entregas rápidas.",
"Plataforma inteligente para delivery moderno",
"ROTA SPEED © 2026"
];

let fraseIndex = 0;

setInterval(()=>{

fraseIndex++;

if(fraseIndex >= frases.length){
fraseIndex = 0;
}

document.getElementById("frase").innerText = frases[fraseIndex];

},4000);


</script>



</body>
</html>
